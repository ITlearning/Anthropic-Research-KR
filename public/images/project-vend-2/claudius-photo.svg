  <rect x="808" y="196" width="58" height="74" rx="12" fill="#d95d56"/>
  <rect x="880" y="196" width="58" height="74" rx="12" fill="#d95d56"/>
  <rect x="804" y="438" width="64" height="82" rx="14" fill="#f5b14b"/>
