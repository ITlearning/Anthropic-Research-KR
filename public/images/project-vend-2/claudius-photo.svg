<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Claudius vending machine photo</title>
  <desc id="desc">A stylized image of the Claudius-operated vending machine, inspired by the source article photo.</desc>
  <rect width="1200" height="900" fill="#ddd8cd"/>
  <rect x="120" y="130" width="960" height="640" rx="36" fill="#e8e2d5"/>
  <rect x="260" y="230" width="360" height="460" rx="28" fill="#405651"/>
  <rect x="286" y="252" width="308" height="164" rx="16" fill="#f8f5ef"/>
