  <text x="440" y="366" fill="#1f1f1a" font-family="Arial, sans-serif" font-size="44" font-weight="700" text-anchor="middle">is run by Claude</text>
  <rect x="310" y="450" width="260" height="160" rx="18" fill="#1a2423" stroke="#626f6d" stroke-width="6"/>
