  <text x="440" y="564" fill="#7c725f" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">running a vending machine</text>
  <rect x="760" y="170" width="220" height="560" rx="22" fill="#f6f8f7" stroke="#3f4b49" stroke-width="10"/>
  <line x1="790" y1="276" x2="950" y2="276" stroke="#c8d0cc" stroke-width="8"/>
  <line x1="790" y1="392" x2="950" y2="392" stroke="#c8d0cc" stroke-width="8"/>
