  <text x="600" y="834" fill="#5f574b" font-family="Arial, sans-serif" font-size="26" text-anchor="middle">WSJ 레드팀 단계에서 촬영된 Claudius 자판기 사진을 바탕으로 재구성한 로컬 일러스트</text>
