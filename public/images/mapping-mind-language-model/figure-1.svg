  <text x="72" y="96" fill="#141413" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700">Golden Gate Bridge Feature</text>
  <text x="72" y="138" fill="#5C5249" font-family="Arial, Helvetica, sans-serif" font-size="28">
    Activates on images and text containing the Golden Gate Bridge
  </text>
