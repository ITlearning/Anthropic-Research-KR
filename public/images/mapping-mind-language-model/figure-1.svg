  <rect x="72" y="190" width="1056" height="462" rx="18" fill="white" stroke="#D4CCC0"/>
  <g font-family="Courier New, monospace" font-size="28" fill="#453B33">
    <text x="96" y="256">... in San <tspan fill="#B85D21" font-weight="700">Francisco</tspan>, the <tspan fill="#B85D21" font-weight="700">Golden Gate Bridge</tspan> was protected ...</text>
    <text x="96" y="320">... compared to the <tspan fill="#B85D21" font-weight="700">Golden Gate Bridge</tspan> in San <tspan fill="#B85D21" font-weight="700">Francisco</tspan>, US ...</text>
    <text x="96" y="384">... before sunset, we had to see the <tspan fill="#B85D21" font-weight="700">Golden Gate Bridge</tspan> ...</text>
    <text x="96" y="460">金門大橋是一座位於美國加州<tspan fill="#B85D21" font-weight="700">舊金山</tspan>灣和太平洋之間的<tspan fill="#B85D21" font-weight="700">金門橋</tspan>。</text>
    <text x="96" y="524">ゴールデン・ゲート・ブリッジは、サンフランシスコ湾と太平洋を結ぶ<tspan fill="#B85D21" font-weight="700">吊橋</tspan>。</text>
    <text x="96" y="588">골든게이트교는 미국 <tspan fill="#B85D21" font-weight="700">샌프란시스코</tspan>와 마린군을 잇는 <tspan fill="#B85D21" font-weight="700">현수교</tspan>이다.</text>
  </g>
