<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">The artifact effect</title>
  <desc id="desc">Grouped bar chart comparing behavior prevalence in conversations with artifacts versus without artifacts.</desc>
  <rect width="1200" height="820" fill="#F4F0E7"/>
  <rect x="20" y="110" width="1160" height="680" rx="34" fill="#FBFAF7"/>
  <text x="600" y="78" text-anchor="middle" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="700">The artifact effect</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="82" y="178" width="112" height="436" rx="18" fill="#EFEBDD"/>
    <text x="138" y="206" text-anchor="middle" fill="#7A756A" font-size="24" font-weight="700">+9.7pp</text>
    <rect x="96" y="332" width="46" height="282" rx="8" fill="#3B9C84"/>
    <rect x="142" y="360" width="46" height="254" rx="8" fill="#9BD7C5"/>
    <text x="119" y="361" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">94.1%</text>
    <text x="165" y="389" text-anchor="middle" fill="#4B4B47" font-size="20">84.5%</text>
    <text x="138" y="640" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="138" dy="0">Refines</tspan>
      <tspan x="138" dy="22">and iterates</tspan>
    </text>

    <rect x="232" y="178" width="112" height="436" rx="18" fill="#EFEBDD"/>
    <text x="288" y="206" text-anchor="middle" fill="#7A756A" font-size="24" font-weight="700">+14.7pp</text>
    <rect x="246" y="422" width="46" height="192" rx="8" fill="#3B9C84"/>
    <rect x="292" y="466" width="46" height="148" rx="8" fill="#9BD7C5"/>
    <text x="269" y="451" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">64%</text>
    <text x="315" y="495" text-anchor="middle" fill="#4B4B47" font-size="20">49.3%</text>
    <text x="288" y="640" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="288" dy="0">Clarifies</tspan>
      <tspan x="288" dy="22">goal</tspan>
    </text>

    <rect x="382" y="178" width="112" height="436" rx="18" fill="#EFEBDD"/>
    <text x="438" y="206" text-anchor="middle" fill="#7A756A" font-size="24" font-weight="700">+13.4pp</text>
    <rect x="396" y="455" width="46" height="159" rx="8" fill="#3B9C84"/>
    <rect x="442" y="495" width="46" height="119" rx="8" fill="#9BD7C5"/>
    <text x="419" y="484" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">52.9%</text>
    <text x="465" y="524" text-anchor="middle" fill="#4B4B47" font-size="20">39.5%</text>
    <text x="438" y="640" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="438" dy="0">Provides</tspan>
      <tspan x="438" dy="22">examples</tspan>
    </text>

    <rect x="532" y="178" width="112" height="436" rx="18" fill="#EFEBDD"/>
    <text x="588" y="206" text-anchor="middle" fill="#7A756A" font-size="24" font-weight="700">+14.5pp</text>
    <rect x="546" y="486" width="46" height="128" rx="8" fill="#3B9C84"/>
    <rect x="592" y="529" width="46" height="85" rx="8" fill="#9BD7C5"/>
    <text x="569" y="515" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">42.8%</text>
    <text x="615" y="558" text-anchor="middle" fill="#4B4B47" font-size="20">28.3%</text>
    <text x="588" y="640" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="588" dy="0">Specifies</tspan>
      <tspan x="588" dy="22">format</tspan>
    </text>

    <rect x="682" y="178" width="112" height="436" rx="18" fill="#EFEBDD"/>
    <text x="738" y="206" text-anchor="middle" fill="#D46653" font-size="24" font-weight="700">-3.7pp</text>
    <rect x="696" y="597" width="46" height="17" rx="8" fill="#3B9C84"/>
    <rect x="742" y="586" width="46" height="28" rx="8" fill="#9BD7C5"/>
    <text x="719" y="620" text-anchor="middle" fill="#4B4B47" font-size="20">5.5%</text>
    <text x="765" y="609" text-anchor="middle" fill="#4B4B47" font-size="20">9.2%</text>
    <text x="738" y="640" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="738" dy="0">Checks</tspan>
      <tspan x="738" dy="22">facts</tspan>
    </text>

    <rect x="832" y="178" width="112" height="436" rx="18" fill="#EFEBDD"/>
    <text x="888" y="206" text-anchor="middle" fill="#D46653" font-size="24" font-weight="700">-3.1pp</text>
    <rect x="846" y="575" width="46" height="39" rx="8" fill="#3B9C84"/>
    <rect x="892" y="565" width="46" height="49" rx="8" fill="#9BD7C5"/>
    <text x="869" y="604" text-anchor="middle" fill="#4B4B47" font-size="20">13%</text>
    <text x="915" y="594" text-anchor="middle" fill="#4B4B47" font-size="20">16.2%</text>
    <text x="888" y="640" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="888" dy="0">Questions</tspan>
      <tspan x="888" dy="22">reasoning</tspan>
    </text>

    <rect x="982" y="178" width="112" height="436" rx="18" fill="#EFEBDD"/>
    <text x="1038" y="206" text-anchor="middle" fill="#D46653" font-size="24" font-weight="700">-5.2pp</text>
    <rect x="996" y="567" width="46" height="47" rx="8" fill="#3B9C84"/>
    <rect x="1042" y="551" width="46" height="63" rx="8" fill="#9BD7C5"/>
    <text x="1019" y="596" text-anchor="middle" fill="#4B4B47" font-size="20">15.8%</text>
    <text x="1065" y="580" text-anchor="middle" fill="#4B4B47" font-size="20">21%</text>
    <text x="1038" y="640" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="1038" dy="0">Identifies</tspan>
      <tspan x="1038" dy="22">missing context</tspan>
    </text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#66625B">
    <rect x="1034" y="150" width="18" height="18" fill="#3B9C84"/>
    <text x="1062" y="165">With artifact</text>
    <rect x="1034" y="182" width="18" height="18" fill="#9BD7C5"/>
    <text x="1062" y="197">Without artifact</text>
  </g>
</svg>
