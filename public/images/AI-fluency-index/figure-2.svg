<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Iteration and refinement</title>
  <desc id="desc">Grouped bar chart comparing behavior prevalence with and without iteration and refinement.</desc>
  <rect width="1200" height="820" fill="#F4F0E7"/>
  <rect x="20" y="110" width="1160" height="680" rx="34" fill="#FBFAF7"/>
  <text x="600" y="78" text-anchor="middle" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="700">Iteration and refinement</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="160" y="182" width="118" height="430" rx="18" fill="#EFEBDD"/>
    <text x="219" y="208" text-anchor="middle" fill="#7A756A" font-size="26" font-weight="700">+23.6pp</text>
    <rect x="174" y="285" width="46" height="327" rx="8" fill="#3B9C84"/>
    <rect x="220" y="427" width="46" height="185" rx="8" fill="#9BD7C5"/>
    <text x="197" y="312" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">54.5%</text>
    <text x="243" y="454" text-anchor="middle" fill="#5E5A55" font-size="20">30.9%</text>
    <text x="219" y="636" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="219" dy="0">Clarifies</tspan>
      <tspan x="219" dy="22">goal</tspan>
    </text>

    <rect x="325" y="182" width="118" height="430" rx="18" fill="#EFEBDD"/>
    <text x="384" y="208" text-anchor="middle" fill="#7A756A" font-size="26" font-weight="700">+22.6pp</text>
    <rect x="339" y="346" width="46" height="266" rx="8" fill="#3B9C84"/>
    <rect x="385" y="481" width="46" height="131" rx="8" fill="#9BD7C5"/>
    <text x="362" y="373" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">44.4%</text>
    <text x="408" y="508" text-anchor="middle" fill="#5E5A55" font-size="20">21.8%</text>
    <text x="384" y="636" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="384" dy="0">Provides</tspan>
      <tspan x="384" dy="22">examples</tspan>
    </text>

    <rect x="490" y="182" width="118" height="430" rx="18" fill="#EFEBDD"/>
    <text x="549" y="208" text-anchor="middle" fill="#7A756A" font-size="26" font-weight="700">+17.1pp</text>
    <rect x="504" y="475" width="46" height="137" rx="8" fill="#3B9C84"/>
    <rect x="550" y="578" width="46" height="34" rx="8" fill="#9BD7C5"/>
    <text x="527" y="502" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">22.8%</text>
    <text x="573" y="601" text-anchor="middle" fill="#5E5A55" font-size="20">5.7%</text>
    <text x="549" y="636" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="549" dy="0">Identifies</tspan>
      <tspan x="549" dy="22">missing context</tspan>
    </text>

    <rect x="655" y="182" width="118" height="430" rx="18" fill="#EFEBDD"/>
    <text x="714" y="208" text-anchor="middle" fill="#7A756A" font-size="26" font-weight="700">+16.3pp</text>
    <rect x="669" y="418" width="46" height="194" rx="8" fill="#3B9C84"/>
    <rect x="715" y="515" width="46" height="97" rx="8" fill="#9BD7C5"/>
    <text x="692" y="445" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">32.4%</text>
    <text x="738" y="542" text-anchor="middle" fill="#5E5A55" font-size="20">16.1%</text>
    <text x="714" y="636" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="714" dy="0">Specifies</tspan>
      <tspan x="714" dy="22">format</tspan>
    </text>

    <rect x="820" y="182" width="118" height="430" rx="18" fill="#EFEBDD"/>
    <text x="879" y="208" text-anchor="middle" fill="#7A756A" font-size="26" font-weight="700">+14.7pp</text>
    <rect x="834" y="505" width="46" height="107" rx="8" fill="#3B9C84"/>
    <rect x="880" y="593" width="46" height="19" rx="8" fill="#9BD7C5"/>
    <text x="857" y="532" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">17.9%</text>
    <text x="903" y="616" text-anchor="middle" fill="#5E5A55" font-size="20">3.2%</text>
    <text x="879" y="636" text-anchor="middle" fill="#55524B" font-size="18">
      <tspan x="879" dy="0">Questions</tspan>
      <tspan x="879" dy="22">reasoning</tspan>
    </text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#66625B">
    <rect x="976" y="188" width="18" height="18" fill="#3B9C84"/>
    <text x="1004" y="203">With iteration</text>
    <rect x="976" y="220" width="18" height="18" fill="#9BD7C5"/>
    <text x="1004" y="235">Without iteration</text>
  </g>
</svg>
