<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Australia in global Claude.ai usage</title>
  <desc id="desc">Summary graphic showing Australia at rank 11, 1.6 percent of global Claude.ai traffic, and AUI 4.1.</desc>
  <rect width="1200" height="800" fill="#faf8f5"/>
  <text x="70" y="92" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700">Global Claude.ai usage: Australia snapshot</text>
  <text x="70" y="128" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="22">Figure recreated from article-reported values for the February 2026 sample.</text>

  <rect x="70" y="180" width="300" height="190" rx="24" fill="#ffffff" stroke="#e7dfd4"/>
  <text x="100" y="230" fill="#6b7280" font-family="Helvetica, Arial, sans-serif" font-size="22">Global Claude.ai share</text>
  <text x="100" y="312" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700">1.6%</text>
  <text x="100" y="342" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="20">Australia's share of all sampled consumer traffic</text>

  <rect x="390" y="180" width="300" height="190" rx="24" fill="#ffffff" stroke="#e7dfd4"/>
  <text x="420" y="230" fill="#6b7280" font-family="Helvetica, Arial, sans-serif" font-size="22">Global rank</text>
  <text x="420" y="312" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700">11</text>
  <text x="420" y="342" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="20">Among all countries in the February 2026 sample</text>

  <rect x="710" y="180" width="420" height="190" rx="24" fill="#c6dbef" stroke="#9ec5ea"/>
  <text x="742" y="230" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="22">Anthropic AI Usage Index (AUI)</text>
  <text x="742" y="312" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700">4.1</text>
  <text x="742" y="342" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="20">Over four times higher than expected from working-age population</text>

  <rect x="70" y="420" width="1060" height="290" rx="28" fill="#ffffff" stroke="#e7dfd4"/>
  <text x="100" y="472" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Rank position within the top twenty</text>
  <text x="100" y="506" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="19">The original figure highlights Australia inside a top-20 country ranking. Here, the ladder shows Australia's reported position without inferring unpublished country shares.</text>

  <line x1="150" y1="580" x2="1050" y2="580" stroke="#cfc7bc" stroke-width="4"/>
  <g font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#57534e" text-anchor="middle">
    <circle cx="190" cy="580" r="18" fill="#e7dfd4"/><text x="190" y="586">1</text>
    <circle cx="232" cy="580" r="18" fill="#e7dfd4"/><text x="232" y="586">2</text>
    <circle cx="274" cy="580" r="18" fill="#e7dfd4"/><text x="274" y="586">3</text>
    <circle cx="316" cy="580" r="18" fill="#e7dfd4"/><text x="316" y="586">4</text>
    <circle cx="358" cy="580" r="18" fill="#e7dfd4"/><text x="358" y="586">5</text>
    <circle cx="400" cy="580" r="18" fill="#e7dfd4"/><text x="400" y="586">6</text>
    <circle cx="442" cy="580" r="18" fill="#e7dfd4"/><text x="442" y="586">7</text>
    <circle cx="484" cy="580" r="18" fill="#e7dfd4"/><text x="484" y="586">8</text>
    <circle cx="526" cy="580" r="18" fill="#e7dfd4"/><text x="526" y="586">9</text>
    <circle cx="568" cy="580" r="18" fill="#e7dfd4"/><text x="568" y="586">10</text>
    <circle cx="610" cy="580" r="24" fill="#4f9bd1"/><text x="610" y="586" fill="#ffffff">11</text>
    <circle cx="652" cy="580" r="18" fill="#e7dfd4"/><text x="652" y="586">12</text>
    <circle cx="694" cy="580" r="18" fill="#e7dfd4"/><text x="694" y="586">13</text>
    <circle cx="736" cy="580" r="18" fill="#e7dfd4"/><text x="736" y="586">14</text>
    <circle cx="778" cy="580" r="18" fill="#e7dfd4"/><text x="778" y="586">15</text>
    <circle cx="820" cy="580" r="18" fill="#e7dfd4"/><text x="820" y="586">16</text>
    <circle cx="862" cy="580" r="18" fill="#e7dfd4"/><text x="862" y="586">17</text>
    <circle cx="904" cy="580" r="18" fill="#e7dfd4"/><text x="904" y="586">18</text>
    <circle cx="946" cy="580" r="18" fill="#e7dfd4"/><text x="946" y="586">19</text>
    <circle cx="988" cy="580" r="18" fill="#e7dfd4"/><text x="988" y="586">20</text>
  </g>
  <text x="610" y="638" fill="#4f9bd1" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Australia</text>
  <text x="610" y="672" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle">One of the leading per-capita adopters of Claude</text>
</svg>
