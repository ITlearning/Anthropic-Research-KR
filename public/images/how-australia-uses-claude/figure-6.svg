<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Composition of Australia's top 100 tasks relative to global top 100</title>
  <desc id="desc">Diverging bar chart showing category differences versus global: Computer and Mathematical -8.0, Educational Instruction -2.7, Management +2.3, Office and Administrative Support +1.3, Life Physical and Social Science +1.3.</desc>
  <rect width="1200" height="820" fill="#faf8f5"/>
  <text x="70" y="88" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700">Australia's top tasks vs. the global top 100</text>
  <text x="70" y="124" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="22">Positive values mean a larger share in Australia. Negative values mean the category is underrepresented in Australia.</text>

  <line x1="600" y1="180" x2="600" y2="710" stroke="#b8b0a5" stroke-width="3"/>
  <line x1="220" y1="180" x2="980" y2="180" stroke="#b8b0a5" stroke-width="2"/>

  <g font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#57534e" text-anchor="middle">
    <text x="300" y="165">-6</text>
    <text x="450" y="165">-3</text>
    <text x="600" y="165">0</text>
    <text x="750" y="165">+3</text>
    <text x="900" y="165">+6</text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#141413">
    <text x="70" y="246">Computer &amp; Mathematical</text>
    <text x="70" y="346">Educational Instruction</text>
    <text x="70" y="446">Management</text>
    <text x="70" y="546">Office &amp; Admin Support</text>
    <text x="70" y="646">Life, Physical &amp; Social Science</text>
  </g>

  <rect x="200" y="208" width="400" height="52" rx="26" fill="#dbb48a"/>
  <rect x="465" y="308" width="135" height="52" rx="26" fill="#e5c9a7"/>
  <rect x="600" y="408" width="115" height="52" rx="26" fill="#8dc3eb"/>
  <rect x="600" y="508" width="65" height="52" rx="26" fill="#b8daf3"/>
  <rect x="600" y="608" width="65" height="52" rx="26" fill="#b8daf3"/>

  <g font-family="Helvetica, Arial, sans-serif" font-size="22">
    <text x="175" y="242" fill="#7c2d12">-8.0pp</text>
    <text x="430" y="342" fill="#7c2d12">-2.7pp</text>
    <text x="730" y="442" fill="#0f172a">+2.3pp</text>
    <text x="680" y="542" fill="#0f172a">+1.3pp</text>
    <text x="680" y="642" fill="#0f172a">+1.3pp</text>
  </g>

  <rect x="70" y="720" width="1060" height="60" rx="20" fill="#ffffff" stroke="#e7dfd4"/>
  <text x="100" y="758" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="20">The largest divergence from the global mix is a lower coding share, partly offset by management, office, and science-related tasks.</text>
</svg>
