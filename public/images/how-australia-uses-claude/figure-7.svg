<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Request clusters over- and underrepresented in Australia</title>
  <desc id="desc">Diverging bars showing General coding assistance -3.3, Personal life management +1.9, Health and well-being support +1.8, Workplace correspondence +1.7, Business documents +1.6, Financial guidance +1.3.</desc>
  <rect width="1200" height="860" fill="#faf8f5"/>
  <text x="70" y="88" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700">Request clusters most over- and underrepresented in Australia</text>
  <text x="70" y="124" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="22">Difference in share of Australian Claude.ai conversations versus the global distribution.</text>

  <line x1="600" y1="190" x2="600" y2="750" stroke="#b8b0a5" stroke-width="3"/>
  <line x1="220" y1="190" x2="980" y2="190" stroke="#b8b0a5" stroke-width="2"/>

  <g font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#57534e" text-anchor="middle">
    <text x="300" y="175">-3</text>
    <text x="450" y="175">-1.5</text>
    <text x="600" y="175">0</text>
    <text x="750" y="175">+1.5</text>
    <text x="900" y="175">+3</text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#141413">
    <text x="70" y="256">General coding assistance</text>
    <text x="70" y="346">Personal life management</text>
    <text x="70" y="436">Health and well-being support</text>
    <text x="70" y="526">Workplace correspondence</text>
    <text x="70" y="616">Business documents</text>
    <text x="70" y="706">Financial guidance</text>
  </g>

  <rect x="270" y="218" width="330" height="52" rx="26" fill="#dbb48a"/>
  <rect x="600" y="308" width="190" height="52" rx="26" fill="#8dc3eb"/>
  <rect x="600" y="398" width="180" height="52" rx="26" fill="#98caef"/>
  <rect x="600" y="488" width="170" height="52" rx="26" fill="#a4d0f0"/>
  <rect x="600" y="578" width="160" height="52" rx="26" fill="#b2d8f2"/>
  <rect x="600" y="668" width="130" height="52" rx="26" fill="#c2e1f5"/>

  <g font-family="Helvetica, Arial, sans-serif" font-size="22">
    <text x="235" y="252" fill="#7c2d12">-3.3pp</text>
    <text x="805" y="342" fill="#0f172a">+1.9pp</text>
    <text x="795" y="432" fill="#0f172a">+1.8pp</text>
    <text x="785" y="522" fill="#0f172a">+1.7pp</text>
    <text x="775" y="612" fill="#0f172a">+1.6pp</text>
    <text x="745" y="702" fill="#0f172a">+1.3pp</text>
  </g>

  <rect x="70" y="772" width="1060" height="58" rx="18" fill="#ffffff" stroke="#e7dfd4"/>
  <text x="100" y="809" fill="#57534e" font-family="Helvetica, Arial, sans-serif" font-size="20">The article also notes that document translation is underrepresented in Australia, consistent with English being the dominant language market.</text>
</svg>
