<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="980" viewBox="0 0 1300 980" role="img" aria-labelledby="title desc">
  <title id="title">Comparing India's Claude.ai use to the global average</title>
  <desc id="desc">Recreated comparison table of nine economic primitives for India and the global Claude.ai average.</desc>
  <rect width="1300" height="980" fill="#FAF8F5"/>
  <text x="70" y="88" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700">Comparing India's Claude.ai use to the global average</text>
  <text x="70" y="124" fill="#57534E" font-family="Helvetica, Arial, sans-serif" font-size="22">Nine economic primitives reported for India (N = 58,098) and the global sample (N = 975,160).</text>

  <rect x="70" y="164" width="540" height="726" rx="30" fill="#EAF3FB" stroke="#C7DDF0"/>
  <rect x="690" y="164" width="540" height="726" rx="30" fill="#FBE9E1" stroke="#F0C7B4"/>

  <text x="110" y="220" fill="#3B82C4" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700">India</text>
  <text x="110" y="252" fill="#64748B" font-family="Helvetica, Arial, sans-serif" font-size="20">N = 58,098</text>
  <text x="730" y="220" fill="#E07A53" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700">Global average</text>
  <text x="730" y="252" fill="#9A3412" font-family="Helvetica, Arial, sans-serif" font-size="20">N = 975,160</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="20">
    <rect x="110" y="288" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="321" fill="#0F172A">Human time</text>
    <text x="548" y="321" text-anchor="end" fill="#3B82C4" font-weight="700">3.8 h</text>

    <rect x="110" y="356" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="389" fill="#0F172A">Human and AI time</text>
    <text x="548" y="389" text-anchor="end" fill="#3B82C4" font-weight="700">14.8 min</text>

    <rect x="110" y="424" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="457" fill="#0F172A">Multitasking</text>
    <text x="548" y="457" text-anchor="end" fill="#3B82C4" font-weight="700">9%</text>

    <rect x="110" y="492" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="525" fill="#0F172A">Human could do alone</text>
    <text x="548" y="525" text-anchor="end" fill="#3B82C4" font-weight="700">84.6%</text>

    <rect x="110" y="560" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="593" fill="#0F172A">Human education</text>
    <text x="548" y="593" text-anchor="end" fill="#3B82C4" font-weight="700">12.2 years</text>

    <rect x="110" y="628" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="661" fill="#0F172A">AI education</text>
    <text x="548" y="661" text-anchor="end" fill="#3B82C4" font-weight="700">12.5 years</text>

    <rect x="110" y="696" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="729" fill="#0F172A">Work use</text>
    <text x="548" y="729" text-anchor="end" fill="#3B82C4" font-weight="700">51.3%</text>

    <rect x="110" y="764" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="797" fill="#0F172A">AI autonomy</text>
    <text x="548" y="797" text-anchor="end" fill="#3B82C4" font-weight="700">3.60</text>

    <rect x="110" y="832" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="138" y="865" fill="#0F172A">Task success</text>
    <text x="548" y="865" text-anchor="end" fill="#3B82C4" font-weight="700">64%</text>

    <rect x="730" y="288" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="321" fill="#7C2D12">Human time</text>
    <text x="1168" y="321" text-anchor="end" fill="#E07A53" font-weight="700">3.1 h</text>

    <rect x="730" y="356" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="389" fill="#7C2D12">Human and AI time</text>
    <text x="1168" y="389" text-anchor="end" fill="#E07A53" font-weight="700">15.4 min</text>

    <rect x="730" y="424" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="457" fill="#7C2D12">Multitasking</text>
    <text x="1168" y="457" text-anchor="end" fill="#E07A53" font-weight="700">9%</text>

    <rect x="730" y="492" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="525" fill="#7C2D12">Human could do alone</text>
    <text x="1168" y="525" text-anchor="end" fill="#E07A53" font-weight="700">87.9%</text>

    <rect x="730" y="560" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="593" fill="#7C2D12">Human education</text>
    <text x="1168" y="593" text-anchor="end" fill="#E07A53" font-weight="700">12.2 years</text>

    <rect x="730" y="628" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="661" fill="#7C2D12">AI education</text>
    <text x="1168" y="661" text-anchor="end" fill="#E07A53" font-weight="700">12.2 years</text>

    <rect x="730" y="696" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="729" fill="#7C2D12">Work use</text>
    <text x="1168" y="729" text-anchor="end" fill="#E07A53" font-weight="700">46%</text>

    <rect x="730" y="764" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="797" fill="#7C2D12">AI autonomy</text>
    <text x="1168" y="797" text-anchor="end" fill="#E07A53" font-weight="700">3.38</text>

    <rect x="730" y="832" width="460" height="52" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <text x="758" y="865" fill="#7C2D12">Task success</text>
    <text x="1168" y="865" text-anchor="end" fill="#E07A53" font-weight="700">67%</text>
  </g>

  <rect x="70" y="910" width="560" height="42" rx="14" fill="#FFFFFF" stroke="#C7DDF0"/>
  <text x="350" y="938" text-anchor="middle" fill="#1D4ED8" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">India compresses 3.8 hours of work into 14.8 minutes with AI.</text>
  <rect x="670" y="910" width="560" height="42" rx="14" fill="#FFFFFF" stroke="#F0C7B4"/>
  <text x="950" y="938" text-anchor="middle" fill="#C2410C" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">Global users compress 3.1 hours of work into 15.4 minutes with AI.</text>
</svg>
