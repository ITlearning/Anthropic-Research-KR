<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">Table of most common O*NET tasks among Claude use in India</title>
  <desc id="desc">Recreated table listing the ten most common O*NET tasks reported for Claude use in India, with their shares.</desc>
  <rect width="1400" height="1040" fill="#FAF8F5"/>
  <text x="60" y="84" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700">Most common O*NET tasks among Claude use in India</text>
  <text x="60" y="120" fill="#57534E" font-family="Helvetica, Arial, sans-serif" font-size="22">Task names follow the shortened wording used in the source article.</text>

  <rect x="60" y="160" width="1280" height="820" rx="28" fill="#FFFFFF" stroke="#D9D2C9" stroke-width="2"/>
  <rect x="60" y="160" width="1280" height="74" rx="28" fill="#E8E2D8"/>
  <text x="94" y="206" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Rank</text>
  <text x="192" y="206" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Task</text>
  <text x="1220" y="206" text-anchor="end" fill="#141413" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Share (%)</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#141413">
    <line x1="60" y1="308" x2="1340" y2="308" stroke="#D9D2C9"/>
    <text x="96" y="282">1</text>
    <text x="192" y="258">Modify existing software to correct errors, allow it to adapt</text>
    <text x="192" y="286">to new hardware, or to improve its performance</text>
    <text x="1220" y="282" text-anchor="end">10.5</text>

    <line x1="60" y1="382" x2="1340" y2="382" stroke="#D9D2C9"/>
    <text x="96" y="356">2</text>
    <text x="192" y="332">Write new programs or modify existing programs to meet</text>
    <text x="192" y="360">customer requirements</text>
    <text x="1220" y="356" text-anchor="end">7.1</text>

    <line x1="60" y1="456" x2="1340" y2="456" stroke="#D9D2C9"/>
    <text x="96" y="430">3</text>
    <text x="192" y="406">Modify existing software to correct errors, to adapt it to</text>
    <text x="192" y="434">new hardware, or to upgrade interfaces</text>
    <text x="1220" y="430" text-anchor="end">4.6</text>

    <line x1="60" y1="530" x2="1340" y2="530" stroke="#D9D2C9"/>
    <text x="96" y="504">4</text>
    <text x="192" y="504">Design, build, or maintain web sites</text>
    <text x="1220" y="504" text-anchor="end">3.0</text>

    <line x1="60" y1="604" x2="1340" y2="604" stroke="#D9D2C9"/>
    <text x="96" y="578">5</text>
    <text x="192" y="554">Assist students who need extra help with their</text>
    <text x="192" y="582">coursework outside of class</text>
    <text x="1220" y="578" text-anchor="end">1.8</text>

    <line x1="60" y1="678" x2="1340" y2="678" stroke="#D9D2C9"/>
    <text x="96" y="652">6</text>
    <text x="192" y="628">Write, update, and maintain computer programs or</text>
    <text x="192" y="656">software packages</text>
    <text x="1220" y="652" text-anchor="end">1.8</text>

    <line x1="60" y1="752" x2="1340" y2="752" stroke="#D9D2C9"/>
    <text x="96" y="726">7</text>
    <text x="192" y="726">Prepare, rewrite and edit copy to improve readability</text>
    <text x="1220" y="726" text-anchor="end">1.6</text>

    <line x1="60" y1="826" x2="1340" y2="826" stroke="#D9D2C9"/>
    <text x="96" y="800">8</text>
    <text x="192" y="776">Diagnose, troubleshoot, and resolve hardware, software,</text>
    <text x="192" y="804">or other network and system problems</text>
    <text x="1220" y="800" text-anchor="end">1.6</text>

    <line x1="60" y1="900" x2="1340" y2="900" stroke="#D9D2C9"/>
    <text x="96" y="874">9</text>
    <text x="192" y="874">Instruct individuals in career development techniques</text>
    <text x="1220" y="874" text-anchor="end">1.4</text>

    <text x="96" y="948">10</text>
    <text x="192" y="924">Develop or apply data mining and machine learning algorithms</text>
    <text x="1220" y="948" text-anchor="end">1.4</text>
