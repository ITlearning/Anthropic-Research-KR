<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">General workforce topics</title>
  <desc id="desc">Bubble chart of topics discussed by general workforce participants from more pessimistic to more optimistic.</desc>
