<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Anthropic Interviewer hero</title>
  <desc id="desc">A stylized illustration of Anthropic Interviewer's planning, interviewing, and analysis workflow.</desc>
  <rect width="1200" height="900" fill="#f7f3ec"/>
  <circle cx="1030" cy="150" r="120" fill="#e3eef9"/>
  <circle cx="190" cy="760" r="160" fill="#f6df96" opacity="0.6"/>
  <rect x="70" y="90" width="320" height="640" rx="28" fill="#dfeafb" stroke="#b8cbe4"/>
  <rect x="440" y="120" width="320" height="610" rx="28" fill="#e5f2e7" stroke="#bdd7c0"/>
  <rect x="810" y="90" width="320" height="640" rx="28" fill="#f8e8ea" stroke="#e7c1c7"/>
  <text x="110" y="150" font-size="42" font-family="Georgia, serif" fill="#2f4a7a">Planning</text>
  <text x="480" y="180" font-size="42" font-family="Georgia, serif" fill="#3c6b33">Interviewing</text>
  <text x="850" y="150" font-size="42" font-family="Georgia, serif" fill="#8c3e43">Analysis</text>
  <text x="110" y="190" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#2f4a7a">Research goals, hypotheses, and interview rubric</text>
  <text x="480" y="220" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#3c6b33">Adaptive dialogue at scale inside Claude</text>
  <text x="850" y="190" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#8c3e43">Themes, evidence, and researcher synthesis</text>
  <rect x="108" y="240" width="244" height="122" rx="18" fill="#f9fbff" stroke="#c8d6e8"/>
  <text x="132" y="278" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#20324d">Interview prompt</text>
  <text x="132" y="315" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4d5b72">What do people in this</text>
  <text x="132" y="338" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4d5b72">profession want to keep</text>
  <text x="132" y="361" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4d5b72">human, and what do they</text>
  <text x="132" y="384" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4d5b72">want AI to automate?</text>
  <rect x="108" y="400" width="244" height="112" rx="18" fill="#f9fbff" stroke="#c8d6e8"/>
  <text x="132" y="438" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#20324d">Review loop</text>
  <text x="132" y="475" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4d5b72">Researchers refine sample-</text>
  <text x="132" y="498" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4d5b72">specific questions before</text>
  <text x="132" y="521" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4d5b72">launching interviews.</text>
  <rect x="472" y="260" width="256" height="370" rx="26" fill="#ffffff" stroke="#cfddd0"/>
  <rect x="500" y="302" width="200" height="88" rx="16" fill="#f3f7fb" stroke="#d7e3ef"/>
  <text x="520" y="336" font-size="20" font-family="Helvetica, Arial, sans-serif" fill="#20324d">AI and creativity</text>
  <text x="520" y="366" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#56697b">Tell me about moments when AI</text>
  <text x="520" y="387" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#56697b">helped or constrained your work.</text>
  <rect x="500" y="414" width="200" height="118" rx="16" fill="#fdfdfd" stroke="#d8e6d9"/>
  <text x="520" y="448" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#374c2c">Participants respond in natural language.</text>
  <text x="520" y="472" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#374c2c">The interviewer adapts follow-up questions</text>
  <text x="520" y="496" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#374c2c">based on domain-specific context.</text>
  <circle cx="678" cy="594" r="16" fill="#111111"/>
  <path d="M671 594h14M678 587v14" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="850" y="244" width="244" height="94" rx="18" fill="#ffffff" stroke="#e2c1c6"/>
  <text x="874" y="281" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#7a383d">Themes</text>
  <text x="874" y="312" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#75535a">Stigma concerns, productivity gains,</text>
  <text x="874" y="334" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#75535a">future role shifts, trust boundaries</text>
  <rect x="850" y="370" width="244" height="190" rx="18" fill="#ffffff" stroke="#e2c1c6"/>
  <text x="874" y="408" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#7a383d">Final report</text>
  <circle cx="925" cy="482" r="42" fill="#dce9f9" stroke="#c3d6ec"/>
  <circle cx="1012" cy="482" r="42" fill="#e3f0e6" stroke="#c7dec9"/>
  <text x="895" y="490" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#2f4a7a">Stigma</text>
  <text x="980" y="490" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#3c6b33">Gains</text>
  <rect x="874" y="528" width="196" height="14" rx="7" fill="#f1d9dc"/>
  <rect x="874" y="528" width="132" height="14" rx="7" fill="#d36f79"/>
  <text x="874" y="596" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#75535a">Researchers synthesize quotes,</text>
  <text x="874" y="619" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#75535a">survey data, and AI-assisted coding.</text>
  <path d="M390 450h44" stroke="#99afcb" stroke-width="6" stroke-linecap="round"/>
  <path d="M760 450h36" stroke="#b4c9b3" stroke-width="6" stroke-linecap="round"/>
  <path d="M426 438l18 12-18 12" fill="none" stroke="#99afcb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M788 438l18 12-18 12" fill="none" stroke="#b4c9b3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="82" y="800" font-size="54" font-family="Georgia, serif" fill="#1f1f1f">Anthropic Interviewer</text>
  <text x="82" y="842" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#4d4d4d">Automated qualitative research to understand how people actually work with AI.</text>
</svg>
